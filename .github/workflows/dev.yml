name: Dev Simulator Auto-Run

on:
  push:
    branches:
      - 'dev/base'

jobs:
  run-on-simulator:
    name: Install on Local Mac Simulator
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS App for Simulator (Debug)
        run: flutter build ios --simulator --debug

      - name: Install on iOS Simulator
        run: xcrun simctl install $FLUTTER_DEVICE_ID build/ios/iphonesimulator/Runner.app

      - name: Launch App on Simulator
        run: xcrun simctl launch $FLUTTER_DEVICE_ID com.dev_hustlers.flutter_boilerbase
