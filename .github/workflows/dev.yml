name: Dev Simulator Auto-Run

on:
  push:
    branches:
      - 'dev/base'

jobs:
  run-on-simulator:
    name: Install on Local Mac Simulator
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Install Dependencies
        run: flutter pub get

      - name: Build iOS App (Debug)
        run: flutter build ios --debug --no-codesign

      - name: Install on iOS Simulator
        run: flutter install -d ${{ secrets.FLUTTER_DEVICE_ID }}

      - name: Launch App on Simulator
        run: xcrun simctl launch ${{ secrets.FLUTTER_DEVICE_ID }} com.dev_hustlers.flutter_boilerbase
